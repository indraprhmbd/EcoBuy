version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ecobuy-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ecobuy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecobuy-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecobuy-backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-ecobuy}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      APP_ENV: production
    networks:
      - ecobuy-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecobuy-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - ecobuy-network

networks:
  ecobuy-network:
    driver: bridge

volumes:
  postgres_data:
